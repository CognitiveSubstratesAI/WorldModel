name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - ubuntu-latest
    steps:
      # WorldModel is standalone (no [sources] dependencies) — nothing to clone as a sibling.
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  format:
    name: Format (Blue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - name: Check formatting
        run: |
          julia -e 'using Pkg; Pkg.add(PackageSpec(name="JuliaFormatter", version="2.5.2"))'
          julia -e 'using JuliaFormatter; format(".")'
          if ! git diff --quiet; then
            echo "::error::Formatting check failed:"
            git --no-pager diff --stat
            exit 1
          fi
          echo "All files Blue-formatted."
